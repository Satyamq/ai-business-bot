<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Business Bot</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <main class="page-shell chat-shell">
        <section class="panel">
            <div class="header-row">
                <div>
                    <h1>Satyavardhan ka AI Business Bot</h1>
                    <p>AI Assistant designed and managed by <strong>Satyavardhan</strong></p>
                </div>
                <a class="link-button" href="{{ url_for('login') }}">Admin</a>
            </div>

            <form class="chat-form" method="POST">
                <input
                    type="text"
                    name="message"
                    placeholder="Type: sales, support, or Name, Phone, Service"
                    autocomplete="off"
                    required
                >
                <button type="submit">Send</button>
            </form>

            {% if reply %}
            <div class="reply-box">
                <span>Bot</span>
                <p>{{ reply }}</p>
            </div>
            {% endif %}
        </section>
    </main>
</body>
</html>
